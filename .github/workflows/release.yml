name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # Job 1: Build the main CC Director WPF app
  # ---------------------------------------------------------------
  build-director:
    name: Build CC Director
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore cc-director.sln

      # Tests run in CI on every push -- no need to re-run here.
      # Three-step build to work around .NET 10 WPF SDK bugs
      # (see scripts/release.ps1 for details)
      - name: Pre-build Core dependency
        run: dotnet build src/CcDirector.Core/CcDirector.Core.csproj -c Release --nologo -v q

      - name: Build WPF with RID
        run: dotnet build src/CcDirector.Wpf/CcDirector.Wpf.csproj -c Release -r win-x64 --self-contained false --nologo -v q

      - name: Publish single-file executable
        run: >
          dotnet msbuild src/CcDirector.Wpf/CcDirector.Wpf.csproj
          -t:Publish
          -p:Configuration=Release
          -p:RuntimeIdentifier=win-x64
          -p:SelfContained=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:NoBuild=true

      - name: Upload cc-director artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-director
          path: src/CcDirector.Wpf/bin/Release/net10.0-windows/win-x64/publish/cc-director.exe
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Job 2: Build Python tools (core document tools + installer)
  # ---------------------------------------------------------------
  build-python-tools:
    name: Build Python Tools
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create artifacts directory
        run: New-Item -ItemType Directory -Path artifacts -Force

      - name: Build Python tools
        shell: pwsh
        run: |
          # Lean release: core document tools + installer only.
          # More tools will be added once the pipeline is proven.
          $tools = @(
            "cc-pdf",
            "cc-html",
            "cc-word",
            "cc-setup"
          )

          $failed = @()

          foreach ($tool in $tools) {
            $toolDir = "tools/$tool"
            $buildScript = "$toolDir/build.ps1"

            if (-not (Test-Path $buildScript)) {
              Write-Host "[SKIP] $tool - no build.ps1" -ForegroundColor Yellow
              continue
            }

            Write-Host ""
            Write-Host "============================================" -ForegroundColor Cyan
            Write-Host "Building $tool..." -ForegroundColor Cyan
            Write-Host "============================================" -ForegroundColor Cyan

            Push-Location $toolDir
            try {
              & powershell -ExecutionPolicy Bypass -File build.ps1
              if ($LASTEXITCODE -ne 0) {
                Write-Host "[FAIL] $tool build failed" -ForegroundColor Red
                $failed += $tool
                continue
              }

              # Determine exe name
              if ($tool -eq "cc-setup") {
                $exeName = "cc-director-setup.exe"
              } else {
                $exeName = "$tool.exe"
              }

              $exePath = "dist/$exeName"
              if (Test-Path $exePath) {
                Copy-Item $exePath "../../artifacts/$exeName" -Force
                Write-Host "[OK] $exeName" -ForegroundColor Green
              } else {
                Write-Host "[FAIL] $exeName not found after build" -ForegroundColor Red
                $failed += $tool
              }
            } finally {
              Pop-Location
            }
          }

          $built = $tools.Count - $failed.Count
          Write-Host ""
          Write-Host "Python tools built: $built / $($tools.Count)" -ForegroundColor Cyan
          if ($failed.Count -gt 0) {
            Write-Host "Failed tools: $($failed -join ', ')" -ForegroundColor Red
            exit 1
          }

      - name: Upload Python tools artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-tools
          path: artifacts/
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Final Job: Create GitHub Release
  # ---------------------------------------------------------------
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-director
      - build-python-tools

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | head -50

      - name: Collect release files
        run: |
          RELEASE_DIR="$(pwd)/release-files"
          mkdir -p "$RELEASE_DIR"

          # Main app
          cp release-artifacts/cc-director/cc-director.exe "$RELEASE_DIR/"

          # Python tools (individual .exe files including installer)
          cp release-artifacts/python-tools/*.exe "$RELEASE_DIR/"

          echo ""
          echo "Release files:"
          ls -lh "$RELEASE_DIR/"

      - name: Generate release manifest
        run: |
          RELEASE_DIR="$(pwd)/release-files"
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST="$RELEASE_DIR/release-manifest.json"

          echo "{" > "$MANIFEST"
          echo "  \"version\": \"$VERSION\"," >> "$MANIFEST"
          echo "  \"tag\": \"$GITHUB_REF_NAME\"," >> "$MANIFEST"
          echo "  \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> "$MANIFEST"
          echo "  \"assets\": {" >> "$MANIFEST"

          first=true
          for file in "$RELEASE_DIR"/*; do
            filename=$(basename "$file")
            # Skip the manifest itself
            if [ "$filename" = "release-manifest.json" ]; then
              continue
            fi
            size=$(stat -c%s "$file")
            sha256=$(sha256sum "$file" | cut -d' ' -f1)

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> "$MANIFEST"
            fi

            printf "    \"%s\": {\"size\": %s, \"sha256\": \"%s\"}" "$filename" "$size" "$sha256" >> "$MANIFEST"
          done

          echo "" >> "$MANIFEST"
          echo "  }" >> "$MANIFEST"
          echo "}" >> "$MANIFEST"

          echo "Release manifest:"
          cat "$MANIFEST"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CC Director v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
