name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            solution: cc-director.sln
          - os: macos-latest
            solution: cc-director-crossplatform.sln

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.solution }}

      - name: Build solution
        run: dotnet build ${{ matrix.solution }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ matrix.solution }} -c Release --no-build --verbosity normal
